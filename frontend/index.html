<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard AI | Advanced Email Threat Protection</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <meta name="description" content="AI-powered phishing detection for your emails. Analyze suspicious emails instantly.">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo">
                <div class="shield-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <h1>PhishGuard <span>AI</span></h1>
            </div>
            <p class="subtitle">Secure your digital life with enterprise-grade threat analysis.</p>
        </header>

        <section class="scanner-section">
            <div class="card glass">
                <div class="card-header">
                    <h2>Scan Suspicious Email</h2>
                </div>
                <form id="scan-form">
                    <div class="input-group">
                        <label for="sender">Sender Email</label>
                        <input type="email" id="sender" placeholder="e.g. support@paypal-security.com" required>
                    </div>
                    <div class="input-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" placeholder="e.g. Urgent: Your account has been suspended" required>
                    </div>
                    <div class="input-group">
                        <label for="body">Email Body</label>
                        <textarea id="body" rows="6" placeholder="Paste the email content here..." required></textarea>
                    </div>
                    <div class="input-group">
                        <label for="urls">URLs Found (optional, comma separated)</label>
                        <input type="text" id="urls" placeholder="e.g. http://bit.ly/secure-login, https://paypal.com">
                    </div>
                    <button type="submit" id="scan-btn">
                        <span class="btn-text">Analyze Email</span>
                        <div class="loader hidden"></div>
                    </button>
                </form>
            </div>

            <div id="result-container" class="hidden">
                <div class="card glass result-card">
                    <div class="result-header">
                        <div id="risk-gauge">
                            <svg viewBox="0 0 36 36" class="circular-chart">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path id="score-circle" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <text x="18" y="20.35" class="percentage" id="score-text">0%</text>
                            </svg>
                        </div>
                        <div class="verdict-info">
                            <h3 id="verdict-title">Analysis Complete</h3>
                            <p id="verdict-status">Risk detected: <span id="verdict-label">Low</span></p>
                        </div>
                    </div>
                    <div class="explanations">
                        <h3>Why this verdict?</h3>
                        <ul id="explanation-list">
                            <!-- Populated by JS -->
                        </ul>
                    </div>
                    <button id="reset-btn" class="secondary-btn">New Scan</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 samore141025. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
